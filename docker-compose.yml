services:
  postgres:
    image: postgres:16-alpine
    container_name: vforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vforge
      POSTGRES_PASSWORD: vforge
      POSTGRES_DB: vforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
